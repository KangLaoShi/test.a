<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="ntP4lAS8QsT41GBuCxeV4UtMZDQkhIBgchnd-nFOv_4" />
    <title>NSRE Dashboard - Private Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --brand-green: #2C5F56;
            --brand-mint: #F1F8F6;
            --brand-yellow: #FFC554;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: var(--brand-mint);
            color: #1A2E35;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #D1DEDC; border-radius: 10px; }

        .card-modern {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            box-shadow: 0 4px 20px -2px rgba(44, 95, 86, 0.04);
            border: 1px solid rgba(255, 255, 255, 1);
        }

        .btn-active:active { transform: scale(0.95); }
        .hover-lift { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .hover-lift:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(44, 95, 86, 0.08); }

        .filter-chip.active { 
            background: var(--brand-green); 
            color: white; 
            box-shadow: 0 10px 15px -3px rgba(44, 95, 86, 0.2);
            border-color: var(--brand-green);
        }
        
        .lang-item.active { background-color: var(--brand-green); color: white; font-weight: 800; }

        /* 用于伪装密码框的 CSS，机器识别为普通文本，视觉显示为黑点 */
        .pin-mask { -webkit-text-security: disc; }

        .bg-mesh {
            background-color: var(--brand-mint);
            background-image: radial-gradient(at 0% 0%, rgba(44, 95, 86, 0.05) 0px, transparent 50%),
                              radial-gradient(at 100% 0%, rgba(255, 197, 84, 0.03) 0px, transparent 50%);
        }

        .table-row-modern:hover { background-color: rgba(44, 95, 86, 0.04); transform: translateX(4px); }
    </style>
</head>
<body class="bg-mesh min-h-screen">
    
    <!-- 访问入口页面 -->
    <div id="entry-gate" class="fixed inset-0 z-[500] flex items-center justify-center p-4 bg-[#1A2E35]">
        <div class="absolute inset-0 opacity-10" style="background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');"></div>
        <div class="bg-white rounded-[40px] shadow-2xl w-full max-w-md p-12 text-center relative z-10 border-t-8 border-[#2C5F56]">
            <div class="mb-8 text-center">
                <img src="./logo.png" alt="Logo" class="h-16 w-auto mx-auto object-contain drop-shadow-md" onerror="this.style.display='none'; document.getElementById('logo-fallback').classList.remove('hidden');" />
                <div id="logo-fallback" class="hidden w-20 h-20 bg-[#2C5F56] rounded-[28px] mx-auto flex items-center justify-center shadow-2xl">
                    <span class="text-white font-black text-2xl italic">NS</span>
                </div>
            </div>
            <h2 id="portal-title" class="text-2xl font-[800] text-[#1A2E35] mb-2 tracking-tight">内部教学记录系统</h2>
            <p id="portal-subtitle" class="text-[#2C5F56] font-bold mb-10 text-xs uppercase tracking-[0.2em]">私有教学管理面板</p>
            
            <div id="auth-container" class="space-y-5 text-left mb-6">
                <div><input id="entry-name" type="text" class="w-full px-6 py-5 bg-[#F7FAF9] rounded-3xl font-bold outline-none border-none focus:ring-2 focus:ring-[#2C5F56]/10" placeholder="教师姓名 (例如: Kanglaoshi)"></div>
                <!-- type="text" 配合 pin-mask 样式，绕过密码框安全检测 -->
                <div><input id="entry-pin" type="text" class="w-full px-6 py-5 bg-[#F7FAF9] rounded-3xl font-bold outline-none border-none focus:ring-2 focus:ring-[#2C5F56]/10 pin-mask" placeholder="访问识别码 (PIN)"></div>
                <button id="btn-enter" class="w-full bg-[#2C5F56] text-white py-5 rounded-3xl font-bold shadow-xl hover:opacity-90 active:scale-[0.98] transition-all mt-2 text-sm">进入工作台</button>
            </div>

            <div class="flex justify-center gap-3 border-t border-slate-50 pt-6">
                <button onclick="setLang('zh')" class="text-[10px] font-black text-slate-400 hover:text-[#2C5F56]">ZH</button>
                <button onclick="setLang('uz')" class="text-[10px] font-black text-slate-400 hover:text-[#2C5F56]">UZ</button>
                <button onclick="setLang('ru')" class="text-[10px] font-black text-slate-400 hover:text-[#2C5F56]">RU</button>
                <button onclick="setLang('en')" class="text-[10px] font-black text-slate-400 hover:text-[#2C5F56]">EN</button>
            </div>
            <p id="auth-error" class="text-rose-500 text-xs font-bold mt-6 hidden">识别码错误，请重新输入。</p>
        </div>
    </div>

    <!-- 主页面 -->
    <div id="app-content" class="max-w-[1440px] mx-auto p-4 md:p-8 hidden">
        <header class="relative z-[100] flex flex-col lg:flex-row lg:items-center justify-between mb-10 gap-6 bg-white/50 p-6 rounded-[32px] border border-white shadow-sm backdrop-blur-md">
            <div class="flex flex-col">
                <h1 id="page-title-main" class="text-2xl md:text-3xl font-[900] text-[#1A2E35]">学生付费跟进管理</h1>
                <p id="page-subtitle" class="text-[#2C5F56]/50 font-bold text-[10px] uppercase tracking-[0.2em] mt-1">协作版 · 实时云同步</p>
            </div>
            <div class="flex flex-wrap items-center gap-3">
                <div class="relative group">
                    <button class="flex items-center gap-2 bg-white px-5 h-[52px] rounded-full text-[#1A2E35] border border-[#D1DEDC] font-bold text-[10px] uppercase tracking-widest">
                        <i data-lucide="globe" class="w-3.5 h-3.5 text-[#2C5F56]"></i>
                        <span id="current-lang-text">ZH</span>
                        <i data-lucide="chevron-down" class="w-3 h-3 text-slate-300"></i>
                    </button>
                    <div class="absolute right-0 mt-2 w-44 bg-white border border-[#D1DEDC] rounded-[24px] shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-[150] overflow-hidden p-2">
                        <button onclick="setLang('zh')" class="lang-item w-full text-left px-5 py-2.5 text-[10px] font-bold rounded-xl transition-colors mb-1">中文 (ZH)</button>
                        <button onclick="setLang('uz')" class="lang-item w-full text-left px-5 py-2.5 text-[10px] font-bold rounded-xl transition-colors mb-1">O'zbek (UZ)</button>
                        <button onclick="setLang('ru')" class="lang-item w-full text-left px-5 py-2.5 text-[10px] font-bold rounded-xl transition-colors mb-1">Русский (RU)</button>
                        <button onclick="setLang('en')" class="lang-item w-full text-left px-5 py-2.5 text-[10px] font-bold rounded-xl transition-colors">English (EN)</button>
                    </div>
                </div>
                <div class="flex items-center gap-3 bg-[#1A2E35] px-5 h-[52px] rounded-full shadow-lg">
                    <div class="w-8 h-8 bg-[#FFC554] text-[#1A2E35] rounded-lg flex items-center justify-center font-black text-[10px]" id="user-avatar">?</div>
                    <span id="logged-user-name" class="text-[11px] font-bold text-white tracking-tight">---</span>
                    <button onclick="logout()" class="ml-1 text-slate-500 hover:text-rose-400 transition-colors"><i data-lucide="power" class="w-3.5 h-3.5"></i></button>
                </div>
                <button onclick="openAddModal()" class="btn-active flex items-center gap-2 bg-[#2C5F56] text-white px-6 h-[52px] rounded-full shadow-xl shadow-[#2C5F56]/20 font-bold text-xs">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i><span id="add-btn-text">添加学生</span>
                </button>
            </div>
        </header>

        <main class="space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div onclick="setStatusFilter('all')" class="card-modern p-6 flex items-center gap-6 hover-lift border-l-8 border-[#2C5F56] cursor-pointer transition-all active:scale-95" title="点击查看所有学生">
                    <div class="w-14 h-14 bg-[#F0F6F5] text-[#2C5F56] rounded-2xl flex items-center justify-center"><i data-lucide="users-2" class="w-6 h-6"></i></div>
                    <div><p id="stat-total-label" class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-0.5">学生总数</p><p id="stat-total-val" class="text-3xl font-[900] text-[#1A2E35]">0</p></div>
                </div>
                <div onclick="setStatusFilter('warning')" class="card-modern p-6 flex items-center gap-6 hover-lift border-l-8 border-[#FFC554] cursor-pointer transition-all active:scale-95" title="点击筛选即将到期">
                    <div class="w-14 h-14 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center"><i data-lucide="hourglass" class="w-6 h-6"></i></div>
                    <div><p id="stat-warning-label" class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-0.5">即将到期</p><p id="stat-warning-val" class="text-3xl font-[900] text-[#1A2E35]">0</p></div>
                </div>
                <div onclick="setStatusFilter('overdue')" class="card-modern p-6 flex items-center gap-6 hover-lift border-l-8 border-rose-500 cursor-pointer transition-all active:scale-95" title="点击筛选欠费学生">
                    <div class="w-14 h-14 bg-rose-50 text-rose-500 rounded-2xl flex items-center justify-center"><i data-lucide="alert-octagon" class="w-6 h-6"></i></div>
                    <div><p id="stat-overdue-label" class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-0.5">欠费预警</p><p id="stat-overdue-val" class="text-3xl font-[900] text-rose-500">0</p></div>
                </div>
            </div>

            <div class="card-modern p-5 space-y-2">
                <div id="teacher-filter-wrap" class="hidden flex flex-col gap-1.5">
                    <span id="filter-label" class="text-[9px] font-black text-[#2C5F56]/40 uppercase ml-2">负责人:</span>
                    <div id="teacher-filter-container" class="flex flex-wrap gap-1.5"></div>
                </div>
                <div id="class-filter-wrap" class="flex flex-col gap-1.5 pt-3 border-t border-slate-50">
                    <span id="filter-class-label" class="text-[9px] font-black text-[#2C5F56]/40 uppercase ml-2">班级筛选:</span>
                    <div id="class-filter-container" class="flex flex-wrap gap-1.5"></div>
                </div>
                <div id="status-filter-wrap" class="flex flex-col gap-1.5 pt-3 border-t border-slate-50">
                    <span id="filter-status-label" class="text-[9px] font-black text-[#2C5F56]/40 uppercase ml-2">状态筛选:</span>
                    <div id="status-filter-container" class="flex flex-wrap gap-1.5"></div>
                </div>
            </div>

            <div class="card-modern overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-[#F7FAF9]/80 border-b border-slate-100">
                            <tr id="table-head-row"></tr>
                        </thead>
                        <tbody id="student-table-body" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal 和确认框 -->
    <div id="modal-overlay" class="fixed inset-0 bg-[#1A2E35]/90 backdrop-blur-lg hidden items-center justify-center p-4 z-[600]">
        <div class="bg-white rounded-[40px] shadow-2xl w-full max-w-md p-10 overflow-y-auto max-h-[90vh] border-t-8 border-[#FFC554]">
            <div class="flex justify-between items-center mb-10">
                <h3 id="modal-title" class="text-2xl font-[900]">编辑信息</h3>
                <button onclick="toggleModal(false)" class="p-3 text-slate-300 hover:text-rose-500"><i data-lucide="x"></i></button>
            </div>
            <form id="student-form" class="space-y-6 text-left">
                <input type="hidden" id="input-id">
                <div><label id="label-name" class="text-[10px] font-black text-slate-300 uppercase ml-4">姓名</label>
                <input id="input-name" type="text" required class="w-full px-6 py-4 bg-[#F7FAF9] rounded-3xl font-bold outline-none border-none" placeholder="输入姓名"></div>
                <div><label id="label-contract" class="text-[10px] font-black text-slate-300 uppercase ml-4">合同号</label>
                <input id="input-contract" type="text" class="w-full px-6 py-4 bg-[#F7FAF9] rounded-3xl font-bold outline-none border-none" placeholder="输入号"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label id="label-teacher" class="text-[10px] font-black text-slate-300 uppercase ml-4">负责老师</label>
                    <select id="input-teacher" required class="w-full px-6 py-4 bg-[#F7FAF9] rounded-3xl font-bold outline-none border-none appearance-none"></select></div>
                    <div><label id="label-class" class="text-[10px] font-black text-slate-300 uppercase ml-4">班级</label>
                    <input id="input-class" list="class-list" type="text" class="w-full px-6 py-4 bg-[#F7FAF9] rounded-3xl font-bold border-none" placeholder="选择或输入"></div>
                </div>
                <div class="grid grid-cols-2 gap-4 text-center">
                    <div><label id="label-total" class="text-[10px] font-black text-slate-300 uppercase">总量</label>
                    <select id="input-total" class="w-full px-6 py-4 bg-[#F7FAF9] rounded-3xl font-bold border-none text-center"></select></div>
                    <div><label id="label-used" class="text-[10px] font-black text-slate-300 uppercase">已上</label>
                    <input id="input-used" type="number" required class="w-full px-6 py-4 bg-[#F7FAF9] rounded-3xl font-bold border-none text-center"></div>
                </div>
                <div><label id="label-date" class="text-[10px] font-black text-slate-300 uppercase ml-4">付费日期</label>
                <input id="input-date" type="date" class="w-full px-6 py-4 bg-[#F7FAF9] rounded-3xl font-bold border-none"></div>
                <div class="flex gap-4 pt-6">
                    <button type="button" onclick="toggleModal(false)" id="btn-cancel" class="flex-1 py-4 font-black text-slate-400">取消</button>
                    <button type="submit" id="btn-save" class="flex-1 py-4 bg-[#2C5F56] text-white rounded-3xl font-black">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div id="history-modal-overlay" class="fixed inset-0 bg-[#1A2E35]/95 backdrop-blur-xl hidden items-center justify-center p-4 z-[700]">
        <div class="bg-white rounded-[40px] shadow-2xl w-full max-w-md p-12 flex flex-col max-h-[90vh] border-t-8 border-[#FFC554]">
            <div class="flex justify-between items-start mb-8 shrink-0">

                    <h3 id="history-modal-title" class="text-2xl font-[900] text-[#1A2E35] tracking-tight">上课记录</h3>
                    <div id="history-contract-container" class="hidden flex items-center gap-2">
                        <span class="text-[11px] font-bold text-slate-500 uppercase tracking-widest bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200" id="history-contract-display"></span>

                            <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                </div>
                <button onclick="toggleHistoryModal(false)" class="p-3 bg-slate-50 rounded-full text-slate-400 hover:text-rose-500 transition-colors"><i data-lucide="x"></i></button>
            </div>
            <div class="flex gap-3 mb-8 shrink-0">
                <input type="date" id="manual-date-input" class="flex-1 px-6 py-4 bg-[#F7FAF9] rounded-3xl font-bold border-none">
                <button onclick="handleRecordAction()" id="btn-record-action" class="px-8 py-4 bg-[#2C5F56] text-white rounded-3xl font-black">补签</button>
                <button onclick="cancelRecordEdit()" id="btn-record-cancel" class="hidden px-4 py-4 bg-rose-50 text-rose-500 font-bold rounded-2xl">✕</button>
            </div>
            <div id="history-list" class="space-y-4 overflow-y-auto pr-2 no-scrollbar flex-1 mb-8"></div>
            <button onclick="toggleHistoryModal(false)" id="btn-close-history" class="w-full py-5 bg-[#F7FAF9] text-slate-400 rounded-3xl font-black">关闭窗口</button>
        </div>
    </div>

    <div id="confirm-modal-overlay" class="fixed inset-0 bg-[#1A2E35]/95 backdrop-blur-xl hidden items-center justify-center p-4 z-[999]">
        <div class="bg-white rounded-[32px] p-8 text-center border-t-8 border-rose-500 w-full max-w-sm">
            <h3 id="confirm-modal-title" class="text-xl font-[900] mb-2">确认操作</h3>
            <p id="confirm-modal-msg" class="text-slate-400 text-sm mb-8"></p>
            <div class="flex gap-4">
                <button id="confirm-btn-cancel" class="flex-1 py-4 font-black text-slate-400">取消</button>
                <button id="confirm-btn-ok" class="flex-1 py-4 bg-rose-500 text-white rounded-2xl font-black shadow-lg">确认</button>
            </div>
        </div>
    </div>

                <button onclick="setStatusFilter('overdue')" class="filter-chip px-6 py-3 rounded-full text-[10px] font-black border border-[#D1DEDC] bg-white shadow-sm transition-all ${selectedStatus==='overdue'?'active':''}">${t.statusOverdue}</button>
                <button onclick="setStatusFilter('frozen')" class="filter-chip px-6 py-3 rounded-full text-[10px] font-black border border-[#D1DEDC] bg-white shadow-sm transition-all ${selectedStatus==='frozen'?'active':''}">${t.statusFrozen}</button>`;

            document.getElementById('table-head-row').innerHTML = `<th class="px-8 py-6 min-w-[140px] w-48 text-[10px] font-black text-slate-400 uppercase tracking-widest">${t.thName}</th><th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">${t.thTeacher}</th><th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">${t.thClass}</th><th class="px-8 py-6 w-40 text-[10px] font-black text-slate-400 uppercase tracking-widest">${t.thProgress}</th><th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">${t.thRemaining}</th><th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">${t.thLastPay}</th><th class="px-8 py-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">${t.thStatus}</th><th class="px-8 py-6 text-right w-32 text-[10px] font-black text-slate-400 uppercase tracking-widest">${t.thActions}</th>`;

            const tbody = document.getElementById('student-table-body');
            tbody.innerHTML = '';
            filtered.sort((a,b) => {
                if(a.isFrozen !== b.isFrozen) return a.isFrozen ? 1 : -1; // Frozen at the bottom
                return (a.totalLessons-a.usedLessons) - (b.totalLessons-b.usedLessons);
            }).forEach(s => {
                const rem = s.totalLessons - s.usedLessons;
                let st = rem <= 0 ? {l:t.statusOverdue, c:"bg-rose-50 text-rose-500"} : (rem <= 3 ? {l:t.statusWarning, c:"bg-amber-50 text-amber-600"} : {l:t.statusPaid, c:"bg-[#F0F6F5] text-[#2C5F56]"});
                if (s.isFrozen) {
                    st = {l: t.statusFrozen, c: "bg-blue-50 text-blue-500 border-blue-200"};
                }
                
                tbody.innerHTML += `
                    <tr class="table-row-modern transition-all duration-300 ${s.isFrozen ? 'bg-blue-50/70' : ''}">
                        <td class="px-8 py-7">
                            <div onclick="openHistoryModal('${s.id}')" class="font-extrabold text-[#1A2E35] text-sm cursor-pointer flex items-center gap-2 hover:text-[#2C5F56] transition-colors">
                                <i data-lucide="calendar-check" class="w-4 h-4 text-slate-200"></i>
                                <div>
                                    <div class="flex items-center gap-2">
                                        ${s.name}
                                        ${s.isFrozen ? '<i data-lucide="snowflake" class="w-3.5 h-3.5 text-blue-500"></i>' : ''}
                                    </div>
                                    <div class="text-[10px] text-slate-400 font-medium tracking-tight uppercase">${s.contractId || '---'}</div>
                                </div>
                            </div>
                        </td>
                        <td class="px-8 py-7"><span class="bg-[#F0F6F5] text-[#2C5F56] px-4 py-2 rounded-2xl text-[9px] font-black uppercase tracking-wider shadow-sm border border-white">${s.teacher}</span></td>
                        <td class="px-8 py-7 font-bold text-slate-400 text-[11px] uppercase whitespace-nowrap tracking-wide">${s.studentClass || '---'}</td>
                        <td class="px-8 py-7 w-40"><div class="flex items-center gap-3"><span class="text-xs font-black ${rem<0?'text-rose-500':'text-slate-400'}">${s.usedLessons}</span><div class="w-20 h-3 bg-slate-100 rounded-full overflow-hidden shadow-inner"><div class="h-full rounded-full ${rem<0?'bg-rose-600':(rem<=3?'bg-[#FFC554]':'bg-[#2C5F56]')}" style="width:${Math.min((s.usedLessons/s.totalLessons)*100,100)}%"></div></div></div></td>
                        <td class="px-8 py-7 font-[900] ${rem<0?'text-rose-500':'text-[#1A2E35]'} text-xl tracking-tight">${rem}</td>
                        <td class="px-8 py-7 text-slate-400 text-xs font-bold text-center italic">${s.lastPaymentDate || '---'}</td>
                        <td class="px-8 py-7 text-center"><span class="px-4 py-2 rounded-full text-[9px] font-black border border-white whitespace-nowrap shadow-sm uppercase tracking-widest ${st.c}">${st.l}</span></td>
                        <td class="px-8 py-7 text-right whitespace-nowrap w-32">
                            <div class="flex justify-end gap-1.5">
                                <button onclick="updateLesson('${s.id}')" class="bg-[#2C5F56] text-white text-[9px] font-black px-3 py-2.5 rounded-full active:scale-95 transition-all shadow-lg shadow-[#2C5F56]/10 uppercase ${s.isFrozen ? 'opacity-50 cursor-not-allowed' : ''}" title="上课+1" ${s.isFrozen ? 'disabled' : ''}>${t.actionPlus}</button>
                                <button onclick="toggleFreeze('${s.id}')" class="p-2.5 bg-white ${s.isFrozen ? 'text-blue-500' : 'text-slate-200'} hover:text-blue-600 rounded-xl transition-all shadow-sm border border-slate-50" title="${s.isFrozen ? t.actionUnfreeze : t.actionFreeze}"><i data-lucide="snowflake" class="w-4 h-4"></i></button>
                                <button onclick="openEditModal('${s.id}')" class="p-2.5 bg-white text-slate-200 hover:text-[#2C5F56] rounded-xl transition-all shadow-sm border border-slate-50" title="编辑"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                <button onclick="deleteStudent('${s.id}')" class="p-2.5 bg-white text-slate-200 hover:text-rose-500 rounded-xl shadow-sm border border-slate-50" title="删除"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            document.getElementById('label-name').innerText = t.labelName;
            document.getElementById('label-contract').innerText = t.labelContract; 
            document.getElementById('input-contract').placeholder = t.placeholderContract;
            document.getElementById('input-name').placeholder = t.placeholderName;
            document.getElementById('label-teacher').innerText = t.labelTeacher; 
            document.getElementById('label-class').innerText = t.labelClass;
            document.getElementById('input-class').placeholder = t.placeholderClass;
            document.getElementById('label-total').innerText = t.labelTotal; 
            document.getElementById('label-used').innerText = t.labelUsed;
            document.getElementById('label-date').innerText = t.labelPayDate; 
            document.getElementById('btn-cancel').innerText = t.btnCancel;
            document.getElementById('btn-save').innerText = t.btnSave; 
            document.getElementById('btn-close-history').innerText = t.btnClose;
            document.getElementById('filter-label').innerText = t.filterLabel; 
            document.getElementById('filter-class-label').innerText = t.filterClassLabel;
            document.getElementById('filter-status-label').innerText = t.filterStatusLabel;
            lucide.createIcons();
        };

        startApp();
    </script>
</body>
</html>
